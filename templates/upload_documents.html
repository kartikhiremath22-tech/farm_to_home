{% extends "base.html" %}
{% block content %}
<div class="form-page">
  <h2>📄 Upload Verification Documents</h2>
  <p class="form-sub">Your documents will be reviewed by our team within 24 hours.</p>

  <form method="POST" action="/upload_documents" enctype="multipart/form-data">
    {% if session.user_role == 'farmer' %}
      <div class="doc-upload-box">
        <label>🪪 Aadhaar Card (PDF/JPG)</label>
        <input type="file" name="aadhaar" accept=".pdf,.jpg,.jpeg,.png" required />
      </div>
      <div class="doc-upload-box">
        <label>🌾 Land Record / 7-12 Utara (PDF/JPG)</label>
        <input type="file" name="land_record" accept=".pdf,.jpg,.jpeg,.png" required />
      </div>
      <div class="doc-upload-box">
        <label>🏭 FSSAI License (PDF/JPG)</label>
        <input type="file" name="fssai" accept=".pdf,.jpg,.jpeg,.png" required />
      </div>
    {% else %}
      <div class="doc-upload-box">
        <label>🪪 Aadhaar Card (PDF/JPG)</label>
        <input type="file" name="aadhaar" accept=".pdf,.jpg,.jpeg,.png" required />
      </div>
      <div class="doc-upload-box">
        <label>🏠 Address Proof (PDF/JPG)</label>
        <input type="file" name="address_proof" accept=".pdf,.jpg,.jpeg,.png" required />
      </div>
    {% endif %}
    <button type="submit" class="submit-btn">📤 Submit Documents</button>
  </form>
</div>
{% endblock %}
