{% extends "base.html" %}
{% block content %}

<div class="form-page">
  <h2>Forgot Password</h2>
  <p class="form-sub">Enter your email and we'll let you set a new password.</p>

  <form method="POST">
    <label>Email</label>
    <input type="email" name="email" placeholder="your@email.com" required />

    <button type="submit" class="submit-btn">Continue</button>
  </form>

  <p class="form-footer">Remembered it? <a href="/login">Back to login</a></p>
</div>

{% endblock %}
